{% extends "base.html" %}

{% block title %}Login - E-Commerce{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-sign-in-alt"></i> Fazer Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="senha" name="senha" required>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Entrar
                        </button>
                    </div>
                </form>
                
                <hr>
                
                <div class="text-center">
                    <p class="text-muted">Ainda não tem conta?</p>
                    <a href="{{ url_for('cadastro') }}" class="btn btn-outline-primary">
                        <i class="fas fa-user-plus"></i> Criar Conta
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Dados de teste -->
        <div class="mt-3">
            <div class="alert alert-info">
                <strong>Dados para teste:</strong><br>
                <small>
                    E-mail: admin@ecommerce.com<br>
                    Senha: admin123
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
